<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be a Smart Spender · 대화 퀴즈</title>
<style>
  :root{
    color-scheme:light;
    --bg:#0e1512; --panel:#16201c; --panel2:#1d2a25;
    --line:#27362f; --ink:#e9f1ec; --muted:#8ea79b;
    --green:#2fae7d; --green-d:#1f7a59; --green-soft:#163228;
    --gold:#d8b24a; --red:#e2604f; --red-soft:#33201d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
    line-height:1.55;letter-spacing:-.01em;
  }
  .wrap{max-width:780px;margin:0 auto;padding:20px 16px 120px}
  header.top{padding:26px 0 14px;border-bottom:2px solid var(--line);margin-bottom:8px}
  .kick{color:var(--green);font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase}
  h1{margin:6px 0 2px;font-size:30px;font-weight:900;letter-spacing:-.03em}
  .sub{color:var(--muted);font-size:14px;font-weight:600}

  section.page{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sec-head{margin:30px 0 6px;padding:16px 18px;background:var(--green-soft);
    border:1.5px solid var(--green-d);border-radius:16px}
  .sec-head .sec-tag{color:var(--green);font-weight:900;font-size:12px;letter-spacing:.1em}
  .sec-head h2{margin:4px 0 2px;font-size:22px;font-weight:900;letter-spacing:-.02em}
  .sec-head h2 em{color:var(--green);font-style:normal;font-size:15px;font-weight:800;margin-left:8px}
  .sec-head p{margin:0;color:var(--muted);font-size:13px;font-weight:600}

  .card{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;
    padding:18px 16px;margin:14px 0}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .qno{background:var(--green-d);color:#fff;font-weight:900;font-size:13px;
    min-width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 6px}
  .qtitle{font-weight:800;font-size:15px}
  .hint{color:var(--muted);font-size:13px;font-weight:600;margin-left:auto}

  .pool,.answer{display:flex;flex-wrap:wrap;gap:8px;min-height:10px}
  .answer{min-height:46px;background:var(--panel2);border:1.5px dashed var(--line);
    border-radius:12px;padding:10px;margin-bottom:10px;align-content:flex-start}
  .answer:empty::before{content:"다음 대화를 순서에 맞게 클릭해보세요.";color:var(--muted);font-size:13px;font-weight:600}
  .chip{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;
    padding:9px 12px;font-size:14px;font-weight:600;cursor:pointer;transition:.12s;user-select:none;
    display:inline-flex;align-items:center;gap:7px;max-width:100%}
  .chip:hover{border-color:var(--green)}
  .chip .ord{background:var(--green);color:#04120c;font-weight:900;font-size:11px;
    min-width:18px;height:18px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center}
  .chip.sent{display:flex;text-align:left}
  .word{font-weight:700}
  .reset{background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
    text-decoration:underline;margin-top:4px;padding:0}

  .fb-line{font-size:15px;font-weight:600;margin:4px 0 10px;line-height:2.1}
  .fb-ko{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:8px}
  .blank{display:inline-block;min-width:140px;background:var(--panel2);border:none;
    border-bottom:2px solid var(--green-d);color:var(--ink);font-size:15px;font-weight:700;
    padding:4px 8px;border-radius:6px 6px 0 0;font-family:inherit}
  .blank:focus{outline:none;border-color:var(--green)}

  .grade-bar{position:fixed;left:0;right:0;bottom:0;background:var(--panel);
    border-top:1.5px solid var(--line);padding:12px 16px;z-index:30}
  .grade-bar .inner{max-width:780px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .btn{border:none;border-radius:12px;font-weight:900;font-size:15px;padding:13px 18px;cursor:pointer;transition:.15s}
  .btn-primary{background:var(--green);color:#04120c;flex:1}
  .btn-primary:hover{background:#37c690}
  .btn-ghost{background:var(--panel2);color:var(--ink);border:1.5px solid var(--line)}

  .overlay{position:fixed;inset:0;background:rgba(4,8,6,.78);display:none;z-index:50;
    align-items:flex-start;justify-content:center;padding:24px 14px;overflow:auto}
  .overlay.on{display:flex}
  .result{background:var(--panel);border:1.5px solid var(--line);border-radius:20px;
    max-width:560px;width:100%;padding:22px 18px}
  .score-big{font-size:46px;font-weight:900;letter-spacing:-.03em;margin:2px 0}
  .score-big span{color:var(--green)}
  .pct{color:var(--muted);font-weight:700}
  .bd{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}
  .bd .b{flex:1;min-width:90px;background:var(--panel2);border:1.5px solid var(--line);
    border-radius:12px;padding:10px;text-align:center}
  .bd .b .n{font-size:20px;font-weight:900}
  .bd .b .l{font-size:12px;color:var(--muted);font-weight:700}
  .wrongbox{background:var(--red-soft);border:1.5px solid #5a2e28;border-radius:12px;
    padding:12px;margin-top:6px;max-height:240px;overflow:auto}
  .wrongbox h4{margin:0 0 8px;font-size:13px;color:var(--red);font-weight:800}
  .wrong-item{font-size:13px;font-weight:600;padding:6px 0;border-bottom:1px solid #4a2722}
  .wrong-item:last-child{border:none}
  .wrong-item .lbl{color:var(--gold);font-weight:800}
  .wrong-item .ans{color:#bfe9d4}
  .allright{color:var(--green);font-weight:800;text-align:center;padding:14px}
  .res-actions{display:flex;gap:10px;margin-top:16px}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green);color:#04120c;font-weight:800;padding:11px 20px;border-radius:30px;
    opacity:0;transition:.25s;z-index:60;font-size:14px}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .mark{font-weight:900;margin-left:6px}
  .mark.o{color:var(--green)} .mark.x{color:var(--red)}
  .graded .chip{cursor:default}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="kick">동아(윤정미) · 중3 영어</div>
    <h1>Be a Smart Spender</h1>
    <div class="sub">4단원 · 대화 퀴즈 · 총 24문항</div>
  </header>

  <div class="sec-head"><span class="sec-tag">PART 1</span>
    <h2>순서 배열<em>8문항</em></h2>
    <p>대화 문장을 순서에 맞게 클릭하세요.</p></div>
  <section class="page" id="seq"></section>

  <div class="sec-head"><span class="sec-tag">PART 2</span>
    <h2>빈칸 채우기<em>8문항</em></h2>
    <p>핵심 표현을 빈칸에 입력하세요.</p></div>
  <section class="page" id="fill"></section>

  <div class="sec-head"><span class="sec-tag">PART 3</span>
    <h2>주요 표현 영작<em>8문항</em></h2>
    <p>단어를 순서대로 클릭해 문장을 완성하세요.</p></div>
  <section class="page" id="write"></section>
</div>

<div class="grade-bar">
  <div class="inner">
    <button class="btn btn-ghost" onclick="resetAll()">전체 초기화</button>
    <button class="btn btn-primary" onclick="gradeAll()">전체 채점하기</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="result" id="resultBox"></div>
</div>
<div class="toast" id="toast">복사되었습니다</div>

<script>
/* ---------- DATA ---------- */
const SEQ = [
  {"id": 1, "lines": ["Hello. May I help you?", "Yes, please. I'd like to get a refund for this watch.", "OK. Was there anything wrong with it?", "No, I just changed my mind. Can I get my money back?", "OK. I'll take care of it right away."]},
  {"id": 2, "lines": ["Hello. Do you need some help?", "Yes. I'd like to return this smartphone case.", "Let's see. Do you have the receipt with you?", "Here it is. I bought it three days ago.", "Oh, then it's possible."]},
  {"id": 3, "lines": ["Hello. Are you looking for anything special?", "No, I'm not. I'd like to exchange this T-shirt. It's too small.", "Sure. What size would you like?", "Large, please.", "Here you are.", "Thank you."]},
  {"id": 4, "lines": ["Hello. What can I do for you?", "Can I exchange this black umbrella for a different color?", "Sure. What color would you like?", "I'd like a yellow one, please.", "OK. Here you are."]},
  {"id": 5, "lines": ["Hello. May I help you?", "Yes, please. I'd like to get a refund for this cap.", "Do you have the receipt?", "No, I don't. I received it as a gift.", "If you don't have the receipt, then, it's not possible to get a refund.", "I see. Then, can I exchange it for something else?", "Yes, you can. What would you like to get?", "I want to get this blue bag.", "Let me see ... The price is the same, so you can just take it.", "Thank you."]},
  {"id": 6, "lines": ["Hello. May I help you?", "Yes, please. I'd like to return this baseball glove.", "OK. Was there anything wrong with it?", "No, I just changed my mind. Can I have my money back?", "OK. Here's your money."]},
  {"id": 7, "lines": ["Hello. Can I help you?", "Yes, please. I'd like to exchange this yellow T-shirt. It's too small for me.", "Sure. What size would you like to exchange it for?", "Medium size, please. Oh! Can I have it in red?", "OK. Here you are."]},
  {"id": 8, "lines": ["Hello. May I help you?", "Yes, please. Can I get a refund for this hat?", "I'm afraid you can't.", "Then, can I exchange this hat for the gloves over there?", "Yes, you can."]}
];
const FILL = [
  {"d": 1, "n": 1, "ko": "그것에 무슨 문제가 있나요?", "before": "Was there anything", "answer": "wrong with", "after": "it?"},
  {"d": 2, "n": 1, "ko": "영수증을 가지고 계신가요?", "before": "Do you have the", "answer": "receipt", "after": "with you?"},
  {"d": 3, "n": 1, "ko": "특별히 찾으시는 게 있나요?", "before": "Are you", "answer": "looking for", "after": "anything special?"},
  {"d": 4, "n": 1, "ko": "이 검은 우산을 다른 색으로 교환할 수 있나요?", "before": "Can I", "answer": "exchange", "after": "this black umbrella for a different color?"},
  {"d": 5, "n": 1, "ko": "환불은 불가능합니다.", "before": "", "answer": "It's not possible to", "after": "get a refund."},
  {"d": 6, "n": 1, "ko": "제 돈을 돌려받을 수 있나요?", "before": "Can I", "answer": "have my money back", "after": "?"},
  {"d": 7, "n": 1, "ko": "이건 저에게 너무 작아요.", "before": "It's", "answer": "too", "after": "small for me."},
  {"d": 8, "n": 1, "ko": "죄송하지만 안 됩니다.", "before": "I'm", "answer": "afraid", "after": "you can't."}
];
const WRITE = [
  {"ko": "이 시계를 환불하고 싶어요.", "tokens": ["I'd", "like", "to", "get", "a", "refund", "for", "this", "watch"], "answer": "I'd like to get a refund for this watch."},
  {"ko": "이 스마트폰 케이스를 환불하고 싶어요.", "tokens": ["I'd", "like", "to", "return", "this", "smartphone", "case"], "answer": "I'd like to return this smartphone case."},
  {"ko": "특별히 찾으시는 게 있나요?", "tokens": ["Are", "you", "looking", "for", "anything", "special"], "answer": "Are you looking for anything special?"},
  {"ko": "이 검은 우산을 다른 색으로 교환할 수 있나요?", "tokens": ["Can", "I", "exchange", "this", "black", "umbrella", "for", "a", "different", "color"], "answer": "Can I exchange this black umbrella for a different color?"},
  {"ko": "그것을 다른 것으로 교환할 수 있나요?", "tokens": ["Can", "I", "exchange", "it", "for", "something", "else"], "answer": "Can I exchange it for something else?"},
  {"ko": "이 야구 글러브를 환불하고 싶어요.", "tokens": ["I'd", "like", "to", "return", "this", "baseball", "glove"], "answer": "I'd like to return this baseball glove."},
  {"ko": "무슨 사이즈로 교환하길 원하시나요?", "tokens": ["What", "size", "would", "you", "like", "to", "exchange", "it", "for"], "answer": "What size would you like to exchange it for?"},
  {"ko": "이 모자를 환불할 수 있나요?", "tokens": ["Can", "I", "get", "a", "refund", "for", "this", "hat"], "answer": "Can I get a refund for this hat?"}
];

/* ---------- HELPERS ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function norm(s){return (s||"").toLowerCase().replace(/[’‘']/g,"'").replace(/[.,!?;:]/g,"").replace(/\s+/g," ").trim();}

const seqState = SEQ.map(q=>({pool:shuffle(q.lines.map((t,i)=>({t,i}))), picked:[]}));
const writeState = WRITE.map(q=>({pool:shuffle(q.tokens.map((t,i)=>({t,i}))), picked:[]}));
let graded=false;

/* ---------- RENDER: SEQUENCE ---------- */
function renderSeq(){
  const root=document.getElementById("seq");root.innerHTML="";
  SEQ.forEach((q,qi)=>{
    const card=document.createElement("div");card.className="card";card.id="seqcard"+qi;
    card.innerHTML='<div class="qhead"><div class="qno">'+q.id+'</div>'+
      '<div class="qtitle">대화 '+q.id+'</div>'+
      '<div class="hint">순서대로 클릭</div></div>';
    const ans=document.createElement("div");ans.className="answer";
    const pool=document.createElement("div");pool.className="pool";
    card.appendChild(ans);card.appendChild(pool);
    const rs=document.createElement("button");rs.className="reset";rs.textContent="↺ 이 문제 다시";
    rs.onclick=function(){if(graded)return;seqState[qi].picked=[];seqState[qi].pool=shuffle(q.lines.map((t,i)=>({t,i})));drawSeqCard(qi);};
    card.appendChild(rs);
    root.appendChild(card);
    drawSeqCard(qi);
  });
}
function drawSeqCard(qi){
  const q=SEQ[qi],st=seqState[qi];
  const card=document.getElementById("seqcard"+qi);
  const ans=card.querySelector(".answer"),pool=card.querySelector(".pool");
  ans.innerHTML="";pool.innerHTML="";
  st.picked.forEach((it,pos)=>{
    const c=document.createElement("div");c.className="chip sent";
    let mark="";
    if(graded){const correct=q.lines[pos]===it.t;mark='<span class="mark '+(correct?'o':'x')+'">'+(correct?'✓':'✗')+'</span>';}
    c.innerHTML='<span class="ord">'+(pos+1)+'</span><span>'+it.t+'</span>'+mark;
    if(!graded)c.onclick=function(){st.pool.push(it);st.picked.splice(pos,1);drawSeqCard(qi);};
    ans.appendChild(c);
  });
  st.pool.forEach((it)=>{
    const c=document.createElement("div");c.className="chip sent";
    c.innerHTML='<span>'+it.t+'</span>';
    if(!graded)c.onclick=function(){st.picked.push(it);st.pool=st.pool.filter(x=>x!==it);drawSeqCard(qi);};
    pool.appendChild(c);
  });
}

/* ---------- RENDER: FILL ---------- */
function renderFill(){
  const root=document.getElementById("fill");root.innerHTML="";
  let curD=0;
  FILL.forEach((q,qi)=>{
    if(q.d!==curD){curD=q.d;const h=document.createElement("div");
      h.style.cssText="font-weight:900;font-size:16px;color:var(--green);margin:18px 4px 2px";
      h.textContent="대화문 "+q.d;root.appendChild(h);}
    const card=document.createElement("div");card.className="card";
    card.innerHTML='<div class="qhead"><div class="qno">'+q.d+'-'+q.n+'</div>'+
      '<div class="qtitle">빈칸 채우기</div></div>'+
      '<div class="fb-ko">'+q.ko+'</div>'+
      '<div class="fb-line">'+q.before+' <input class="blank" id="fb'+qi+'" autocomplete="off" spellcheck="false"> '+q.after+
      ' <span id="fbm'+qi+'"></span></div>';
    root.appendChild(card);
  });
}

/* ---------- RENDER: WRITE ---------- */
function renderWrite(){
  const root=document.getElementById("write");root.innerHTML="";
  WRITE.forEach((q,qi)=>{
    const card=document.createElement("div");card.className="card";card.id="wcard"+qi;
    card.innerHTML='<div class="qhead"><div class="qno">'+(qi+1)+'</div>'+
      '<div class="qtitle">단어 배열 영작</div>'+
      '<div class="hint">단어를 순서대로 클릭</div></div>'+
      '<div class="fb-ko">'+q.ko+'</div>';
    const ans=document.createElement("div");ans.className="answer";
    const pool=document.createElement("div");pool.className="pool";
    card.appendChild(ans);card.appendChild(pool);
    const rs=document.createElement("button");rs.className="reset";rs.textContent="↺ 이 문제 다시";
    rs.onclick=function(){if(graded)return;writeState[qi].picked=[];writeState[qi].pool=shuffle(q.tokens.map((t,i)=>({t,i})));drawWriteCard(qi);};
    card.appendChild(rs);
    root.appendChild(card);
    drawWriteCard(qi);
  });
}
function drawWriteCard(qi){
  const q=WRITE[qi],st=writeState[qi];
  const card=document.getElementById("wcard"+qi);
  const ans=card.querySelector(".answer"),pool=card.querySelector(".pool");
  ans.innerHTML="";pool.innerHTML="";
  st.picked.forEach((it,pos)=>{
    const c=document.createElement("div");c.className="chip";
    let mark="";
    if(graded){const correct=q.tokens[pos]===it.t;mark='<span class="mark '+(correct?'o':'x')+'">'+(correct?'✓':'✗')+'</span>';}
    c.innerHTML='<span class="ord">'+(pos+1)+'</span><span class="word">'+it.t+'</span>'+mark;
    if(!graded)c.onclick=function(){st.pool.push(it);st.picked.splice(pos,1);drawWriteCard(qi);};
    ans.appendChild(c);
  });
  st.pool.forEach((it)=>{
    const c=document.createElement("div");c.className="chip";
    c.innerHTML='<span class="word">'+it.t+'</span>';
    if(!graded)c.onclick=function(){st.picked.push(it);st.pool=st.pool.filter(x=>x!==it);drawWriteCard(qi);};
    pool.appendChild(c);
  });
}

/* ---------- GRADE ---------- */
function gradeAll(){
  graded=true;
  document.querySelectorAll(".page").forEach(p=>p.classList.add("graded"));
  const wrong={seq:[],fill:[],write:[]};
  let seqCorrect=0;
  SEQ.forEach((q,qi)=>{
    const picked=seqState[qi].picked.map(x=>x.t);
    const ok = picked.length===q.lines.length && q.lines.every((l,i)=>l===picked[i]);
    if(ok)seqCorrect++;else wrong.seq.push("대화 "+q.id);
    drawSeqCard(qi);
  });
  let fillCorrect=0;
  FILL.forEach((q,qi)=>{
    const inp=document.getElementById("fb"+qi);
    const ok=norm(inp.value)===norm(q.answer);
    const m=document.getElementById("fbm"+qi);
    if(ok){fillCorrect++;m.innerHTML='<span class="mark o">✓</span>';inp.style.borderColor="var(--green)";}
    else{m.innerHTML='<span class="mark x">✗</span> <span style="color:#bfe9d4;font-weight:700;font-size:13px">'+q.answer+'</span>';
      inp.style.borderColor="var(--red)";
      wrong.fill.push("대화문 "+q.d+"-"+q.n+" → "+q.answer);}
    inp.disabled=true;
  });
  let writeCorrect=0;
  WRITE.forEach((q,qi)=>{
    const picked=writeState[qi].picked.map(x=>x.t);
    const ok = picked.length===q.tokens.length && q.tokens.every((t,i)=>t===picked[i]);
    if(ok)writeCorrect++;else wrong.write.push((qi+1)+"번 → "+q.answer);
    drawWriteCard(qi);
  });
  showResult(seqCorrect,fillCorrect,writeCorrect,wrong);
}

function showResult(s,f,w,wrong){
  const tot=s+f+w, max=SEQ.length+FILL.length+WRITE.length;
  const pct=Math.round(tot/max*100);
  let wrongHtml="";
  const groups=[["순서 배열",wrong.seq],["빈칸 채우기",wrong.fill],["주요 표현 영작",wrong.write]];
  const anyWrong=wrong.seq.length+wrong.fill.length+wrong.write.length>0;
  if(anyWrong){
    wrongHtml='<div class="wrongbox"><h4>틀린 문제 '+(max-tot)+'개</h4>';
    groups.forEach(g=>{g[1].forEach(it=>{
      wrongHtml+='<div class="wrong-item"><span class="lbl">['+g[0]+']</span> <span class="ans">'+it+'</span></div>';
    });});
    wrongHtml+='</div>';
  }else{
    wrongHtml='<div class="allright">🎉 전부 정답입니다! 완벽해요.</div>';
  }
  document.getElementById("resultBox").innerHTML=
    '<div class="kick" style="color:var(--green)">채점 결과</div>'+
    '<div class="score-big"><span>'+tot+'</span> / '+max+'</div>'+
    '<div class="pct">정답률 '+pct+'%</div>'+
    '<div class="bd">'+
      '<div class="b"><div class="n">'+s+'/'+SEQ.length+'</div><div class="l">순서 배열</div></div>'+
      '<div class="b"><div class="n">'+f+'/'+FILL.length+'</div><div class="l">빈칸 채우기</div></div>'+
      '<div class="b"><div class="n">'+w+'/'+WRITE.length+'</div><div class="l">영작</div></div>'+
    '</div>'+
    wrongHtml+
    '<div class="res-actions">'+
      '<button class="btn btn-primary" onclick="copyResult()">📋 카톡용 결과 복사</button>'+
      '<button class="btn btn-ghost" onclick="closeResult()">닫기</button>'+
    '</div>'+
    '<div style="text-align:center;color:var(--muted);font-size:12px;font-weight:600;margin-top:10px">복사한 결과를 선생님께 카카오톡으로 붙여넣어 보내 주세요.</div>';
  let txt="[중3 Be a Smart Spender 대화 퀴즈 결과]\n점수: "+tot+"/"+max+" ("+pct+"%)\n";
  txt+="- 순서배열: "+s+"/"+SEQ.length+"\n- 빈칸채우기: "+f+"/"+FILL.length+"\n- 영작: "+w+"/"+WRITE.length+"\n";
  if(anyWrong){
    txt+="\n[틀린 문제]\n";
    groups.forEach(g=>{g[1].forEach(it=>{txt+="· "+g[0]+": "+it+"\n";});});
  }else{txt+="\n전부 정답! 🎉\n";}
  const now=new Date();
  txt+="\n"+now.getFullYear()+"."+(now.getMonth()+1)+"."+now.getDate()+" "+
    String(now.getHours()).padStart(2,'0')+":"+String(now.getMinutes()).padStart(2,'0');
  window.__copyText=txt;
  document.getElementById("overlay").classList.add("on");
}
function copyResult(){
  const t=window.__copyText||"";
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(showToast).catch(fallbackCopy);
  }else{fallbackCopy();}
  function fallbackCopy(){
    const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");showToast();}catch(e){}
    document.body.removeChild(ta);
  }
}
function showToast(){const t=document.getElementById("toast");t.classList.add("on");setTimeout(function(){t.classList.remove("on");},1600);}
function closeResult(){document.getElementById("overlay").classList.remove("on");}
function resetAll(){if(confirm("모든 답을 지우고 처음부터 다시 풀까요?"))location.reload();}

renderSeq();renderFill();renderWrite();
</script>
</body>
</html>
